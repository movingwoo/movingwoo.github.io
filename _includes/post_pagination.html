{% if page.previous or page.next %}
<nav class="post-navigation">
  <div id="postNavigation" class="post-navigation__container"></div>

  <script>
    // 별도 js로 현재 post data만 넘겨주고, 전체 글 목록은 post_pagination.js가
    // /assets/data/posts.json을 fetch해서 가져옴 (모든 글 페이지에 중복 직렬화 방지)
    window.postData = {
      currentPost: {
        title: "{{ page.title | escape }}",
        url: "{{ page.url | escape }}",
        date: "{{ page.date | date: '%Y-%m-%d' }}",
        categories: {{ page.categories | jsonify }}
      },
      allPostsUrl: "{{ '/assets/data/posts.json' | relative_url }}"
    };
  </script>
  <script src="/assets/js/post_pagination.js" defer></script>
</nav>
{% endif %}
